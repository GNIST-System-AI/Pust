<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1ec;
      --bg-warm: #efe9e0;
      --surface: #ffffff;
      --border: #e6ddd0;
      --text: #2e2a26;
      --text-soft: #6b6258;
      --text-dim: #a89e92;
      --accent: #c97b5a;
      --accent-soft: #e8c4b0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at top, var(--bg-warm) 0%, var(--bg) 70%);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      flex-shrink: 0;
      position: relative;
    }

    .brand {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 22px;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .reset-btn {
      position: absolute;
      right: 24px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      padding: 6px;
      display: none;
    }
    .reset-btn:hover { color: var(--text-soft); }

    /* LANDING */
    #landing {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      animation: fadeIn 0.5s ease;
    }

    .landing-inner {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .landing-title {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 34px;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 20px;
    }

    .landing-sub {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-soft);
      margin-bottom: 40px;
    }

    .start-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .start-btn:hover { background: #b86a4a; transform: translateY(-1px); }

    .disclaimer {
      margin-top: 32px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-dim);
    }

    /* CHAT */
    #chat {
      flex: 1;
      display: none;
      flex-direction: column;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; animation: msgIn 0.3s ease; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 14px 18px;
      font-size: 15.5px;
      line-height: 1.65;
    }

    .msg.assistant .bubble {
      background: var(--surface);
      border-radius: 4px 18px 18px 18px;
      color: var(--text);
      box-shadow: 0 1px 3px rgba(46,42,38,0.05);
    }

    .msg.user .bubble {
      background: var(--accent-soft);
      border-radius: 18px 4px 18px 18px;
      color: #6b3a28;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 18px;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--accent-soft);
      border-radius: 50%;
      animation: breathe 1.6s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.25s; }
    .dot:nth-child(3) { animation-delay: 0.5s; }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 24px 24px;
      flex-shrink: 0;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 13px 18px;
      resize: none;
      line-height: 1.5;
      outline: none;
      min-height: 48px;
      max-height: 130px;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent-soft); }
    textarea::placeholder { color: var(--text-dim); }

    .send {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: #fff;
      width: 48px; height: 48px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .send:hover:not(:disabled) { background: #b86a4a; }
    .send:disabled { opacity: 0.3; cursor: default; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

    @media (max-width: 480px) {
      .landing-title { font-size: 28px; }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="brand">pust</span>
    <button class="reset-btn" id="resetBtn" onclick="goBack()">Start på nytt</button>
  </header>

  <div id="landing">
    <div class="landing-inner">
      <h1 class="landing-title">Tungt akkurat nå?</h1>
      <p class="landing-sub">Skriv det ut. Ingen dømmer deg her.<br/>Vi tar det ett steg av gangen.</p>
      <button class="start-btn" onclick="start()">Begynn</button>
      <p class="disclaimer">Dette er ikke en erstatning for ekte mennesker eller hjelp.<br/>Har du det virkelig vondt: ring Mental Helse 116 123 eller Kors på halsen 800 33 321.</p>
    </div>
  </div>

  <div id="chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Hva skjer?" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send" id="sendBtn" onclick="send()" disabled>↑</button>
    </div>
  </div>

  <script>
    let history = [];
    let loading = false;

    function start() {
      history = [];
      document.getElementById('landing').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('resetBtn').style.display = 'block';
      const opener = "Hei. Jeg er her. Fortell hva som skjer — så tar vi det rolig sammen.";
      history.push({ role: 'assistant', content: opener });
      appendMessage('assistant', opener);
      setTimeout(() => { document.getElementById('input').focus(); }, 100);
    }

    function goBack() {
      history = [];
      document.getElementById('chat').style.display = 'none';
      document.getElementById('landing').style.display = 'flex';
      document.getElementById('resetBtn').style.display = 'none';
      document.getElementById('input').value = '';
      document.getElementById('messages').innerHTML = '';
    }

    function appendMessage(role, text) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.id = 'typing';
      div.innerHTML = `<div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || loading) return;
      input.value = '';
      autoResize(input);
      updateSendBtn();
      history.push({ role: 'user', content: text });
      appendMessage('user', text);
      loading = true;
      appendTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        removeTyping();
        const reply = data.text || 'Beklager, noe gikk galt. Prøv igjen.';
        history.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);
      } catch {
        removeTyping();
        appendMessage('assistant', 'Noe gikk galt. Prøv igjen om litt.');
      }
      loading = false;
      input.focus();
      updateSendBtn();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    }
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 130) + 'px';
      updateSendBtn();
    }
    function updateSendBtn() {
      const input = document.getElementById('input');
      document.getElementById('sendBtn').disabled = !input.value.trim() || loading;
    }
    document.getElementById('input').addEventListener('input', updateSendBtn);
  </script>
</body>
</html>
